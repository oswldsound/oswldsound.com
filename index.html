<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oswld Sound</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  height: 100%;
  background: #000;
  color: #fff;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  overflow-y: scroll;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
body::-webkit-scrollbar { width: 0; background: transparent; }

/* Alineación al borde como cristianrus.me */
.container {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 80px 60px; /* menos margen que antes */
}

/* Título principal */
h1 {
  font-size: 3rem;
  font-weight: 700;
  margin: 0 0 15px 0; /* margen más ajustado */
}

/* Subtítulo = close your eyes */
h2 {
  font-size: 1.25rem;
  font-weight: 400;
  margin: 0 0 30px 0; /* menos espacio antes de enlaces */
  color: #ccc;
  text-transform: lowercase;
}

/* Enlaces principales */
.main-links {
  display: flex;
  flex-direction: column;
  gap: 30px; /* menos que antes */
  font-size: 2rem;
}

/* Enlaces secundarios */
.secondary-links {
  display: flex;
  flex-direction: column;
  gap: 18px;
  font-size: 1.25rem;
  margin-top: 40px; /* mantiene separación visual */
  color: #aaa;
}

.link {
  color: #fff;
  cursor: pointer;
  text-decoration: none;
  transition: color 0.25s ease;
}

.link.underline {
  text-decoration: underline;
  text-decoration-thickness: 2px;
  text-decoration-color: #fff;
}

.link:hover {
  color: #ddd;
}

/* Ajustes para móviles */
@media (max-width: 600px) {
  .container { padding: 60px 20px; }
  h1 { font-size: 2.5rem; margin-bottom: 10px; }
  h2, .secondary-links { font-size: 1rem; margin-bottom: 20px; }
  .main-links { font-size: 1.5rem; gap: 20px; }
}
</style>
</head>
<body>

<div class="container">
  <h1>OS</h1>
  <h2>close your eyes</h2>

  <div class="main-links">
    <a href="https://oswldsound.beatstars.com" class="link underline" target="_blank">Beats</a>
    <a href="https://credits.muso.ai/profile/b9d6627c-d639-4b0f-bddc-f729d2612a7c" class="link underline" target="_blank">Credits</a>
  </div>

  <div class="secondary-links">
    <a href="mailto:os@oswldsound.com" class="link">Email</a>
    <a href="https://www.instagram.com/oswldsound/" class="link" target="_blank">Instagram</a>
    <a href="https://www.youtube.com/@oswldsound" class="link" target="_blank">YouTube</a>
  </div>
</div>

</body>
</html>
