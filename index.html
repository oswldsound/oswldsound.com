* {

}

html,
body {

}

body {
  color: #fff;
  font-family:

    "SF Pro Text",
    "SF Pro Display",
    Inter,
    "Segoe UI",
    Arial,

}

body::-webkit-scrollbar {

}

.container {

h1 {

}

.main-links,

  flex-direction: column;
  align-items: flex-start;
}

.main-links {
  gap: 30px;
  font-size: 1.5rem;
}

.secondary-links {
  gap: 30px;
  margin-top: 60px;
  font-size: 18px;
  color: #aaa;
}

a {
  color: #e8e8e8;
  text-decoration: none;
  transition: color .25s ease;
  display: inline-block;
}

a.underline {
  text-decoration: underline;
  text-decoration-thickness: 2px;
}

a:hover {
  color: #ddd;
}

@media (max-width: 600px) {

  .container {
    padding: 40px 30px;
  }

  h1 {
    font-size: 2.25rem;
    margin-bottom: 10px;
  }

    font-size: 0.875rem;
    margin-bottom: 40px;

    gap: 20px;
  }
