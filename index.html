<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oswld Sound</title>
<style>
body {
  margin: 0;
  background: #0F1214;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  text-align: center;
}

h1 {
  font-size: 3.5rem;
  font-weight: 700;
  margin: 0 0 10px 0;
}

h2 {
  font-size: 1.4rem;
  font-weight: 400;
  margin: 0 0 60px 0;
  color: #cccccc;
}

.links {
  display: flex;
  flex-direction: column;
  gap: 30px;
  font-size: 1.5rem;
}

.link {
  position: relative;
  display: inline-block;
  cursor: pointer;
}

.link.underline::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 2px;
  background: #00ffff;
  left: 0;
  bottom: -4px;
}

.link:hover.underline::after {
  background: #00ffff;
}

.link.no-underline {
  text-decoration: none;
  color: white;
}

.link.no-underline:hover {
  color: #00ffff;
}
</style>
</head>
<body>

<div class="container">
  <h1>Oswld Sound</h1>
  <h2>Close Your Eyes</h2>

  <div class="links">
    <a href="https://oswldsound.beatstars.com" class="link underline" target="_blank">Beats</a>
    <a href="https://credits.muso.ai/profile/b9d6627c-d639-4b0f-bddc-f729d2612a7c" class="link underline" target="_blank">Credits</a>
    <a href="mailto:os@oswldsound.com" class="link no-underline">Email</a>
    <a href="https://www.instagram.com/oswldsound/" class="link no-underline" target="_blank">Instagram</a>
  </div>
</div>

</body>
</html>
